# =============================================================================
# Billets Monitor MVP - Configuration Nginx
# Reverse proxy vers Gunicorn + SSL Let's Encrypt
# =============================================================================

# Redirection HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN.com www.DOMAIN.com;

    # Certbot challenge (nécessaire pour le renouvellement SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Rediriger tout le reste vers HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Serveur HTTPS principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name DOMAIN.com www.DOMAIN.com;

    # --- Certificats SSL Let's Encrypt ---
    ssl_certificate     /etc/letsencrypt/live/DOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN.com/privkey.pem;

    # --- Paramètres SSL recommandés ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # --- En-têtes de sécurité ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- Taille maximale des requêtes ---
    client_max_body_size 10M;

    # --- Compression Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # --- Fichiers statiques servis directement par Nginx ---
    location /static/ {
        alias /var/www/billets-monitor/backend/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Favicon ---
    location /favicon.ico {
        alias /var/www/billets-monitor/backend/static/favicon.ico;
        access_log off;
        log_not_found off;
        expires 30d;
    }

    # --- Proxy vers Gunicorn (Flask) ---
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # --- Bloquer l'accès aux fichiers sensibles ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.(env|db|sqlite|sqlite3|log)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # --- Logs ---
    access_log /var/log/nginx/billets-monitor.access.log;
    error_log  /var/log/nginx/billets-monitor.error.log warn;
}
